function renderTable(data) {
  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td>No data</td></tr>";
    thead.innerHTML = "";
    return;
  }

  const keys = Object.keys(data[0]);

  thead.innerHTML = "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row => {
    return "<tr>" + keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") + "</tr>";
  }).join("");
}


function renderStats(containerId, data, compact = false) {

  const total = data.length;
  const generatedAdvantage = data.filter(r => r.generated_advantage).length;
  const noFalta = data.filter(r => r.result !== "FALTA SIN TIROS");
  const selectedShot = noFalta.filter(r => r.selected_shot).length;
  const shots = data.filter(r => r.result?.includes("2") || r.result?.includes("3"));

  const points = data.reduce((sum, r) => {

    if (r.result === "2+" || r.result === "2+1") return sum + 2;
    if (r.result === "3+" || r.result === "3+1") return sum + 3;

    return sum;

  }, 0);

  const turnovers = data.filter(r => r.result === "TO").length;

  const poss = data.filter(r =>
    r.result === "TO" ||
    r.result?.includes("2") ||
    r.result?.includes("3")
  );

  const stats = [
    {
      title: "% Ventajas generadas",
      value: total ? (generatedAdvantage / total * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "% Tiros elegidos",
      value: noFalta.length ? (selectedShot / noFalta.length * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "Puntos por tiro",
      value: shots.length ? (points / shots.length).toFixed(2) : "-"
    },
    {
      title: "TO%",
      value: poss.length ? (turnovers / poss.length * 100).toFixed(1) + "%" : "-"
    }
  ];

  const bg = compact ? "#f6f6f6" : "#fafafa";
  const titleSize = compact ? "11px" : "13px";
  const valueSize = compact ? "22px" : "28px";
  const padding = compact ? "12px" : "15px";

  document.getElementById(containerId).innerHTML =
    stats.map(s => `
      <div style="
        border:1px solid #ddd;
        border-radius:8px;
        padding:${padding};
        text-align:center;
        background:${bg};
      ">
        <div style="font-size:${titleSize}; color:#666;">
          ${s.title}
        </div>

        <div style="font-size:${valueSize}; font-weight:bold; margin-top:8px;">
          ${s.value}
        </div>
      </div>
    `).join("");

}


function renderTransitionButtons(rows){
  
  const container=document.getElementById("transitionButtons");

  container.innerHTML="";

  // Botó TODOS
  const all=document.createElement("button");

  all.className="toggle-btn";
  all.innerText="TODOS";

  if(transitionFilter==="")
    all.classList.add("active");

    all.onclick=()=>{
        transitionFilter="";
        renderTransitionButtons(rows);
        loadData();
    };

    container.appendChild(all);

    // Altres valors
    const values=[
        ...new Set(
            rows
                .map(r=>r.transition_screen)
                .filter(v=>v)
        )
    ];

    values.forEach(value=>{
        const btn=document.createElement("button");
        btn.className="toggle-btn";
        btn.innerText=value;

        if(value===transitionFilter)
            btn.classList.add("active");

        btn.onclick=()=>{
            transitionFilter=value;
            renderTransitionButtons(rows);
            loadData();
        };

        container.appendChild(btn);
    });

}


function renderTeamToggles(teams) {

    const container = document.getElementById("teamToggles");
    container.innerHTML = "";

    teams.forEach(team => {

        const btn = document.createElement("button");

        btn.innerText = team.name;
        btn.className = "toggle-btn";

        if (team.uuid === selectedTeam) {
            btn.classList.add("active");
        }

        btn.onclick = () => {

            selectedTeam = team.uuid;
            [...container.children].forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadData();

        };

        container.appendChild(btn);

    });

}

function getToday() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

const setGroups = allGroups.filter(g =>

                            ${metric.format(r[metric.key])}
                        </div>
                    </div>

                </div>`;

            }).join("")}

        </div>`;

    }).join("");

}

function getRankingGroup(r){

    }

    if(r.transition_screen === "ESTÁTICO"){
        return `${r.focus} · Estático`;
    }

    return `${r.focus}`;

}


function calcStats(rows){

  const total=rows.length;
  const vg=rows.filter(r=>r.generated_advantage).length;
  const noFalta=rows.filter(r=>r.result!="FALTA SIN TIROS");
  const ts=noFalta.filter(r=>r.selected_shot).length;
  const tiros=rows.filter(r=> r.result?.includes("2") || r.result?.includes("3"));
  
  const pts=rows.reduce((s,r)=>{

        if(r.result=="2+"||r.result=="2+1") return s+2;
        if(r.result=="3+"||r.result=="3+1") return s+3;

        return s;
    },0);

  const tov=rows.filter(r=>r.result=="TO").length;

  const poss=rows.filter(r=> r.result=="TO" || r.result?.includes("2") || r.result?.includes("3"));

  return{
    n: total,
    vg:total?vg/total:0,
    ts:noFalta.length?ts/noFalta.length:0,
    ppt:tiros.length?pts/tiros.length:0,
    tov:poss.length?tov/poss.length:0
  }

}


function buildRankingGroups(rows){

    const groups = {};

    rows.forEach(r=>{

        let key = r.score_group || "(Sense focus)";

        if(!groups[key]){
            groups[key] = {
                name:key,
                rows:[]
            };
        }

        groups[key].rows.push(r);

    });

    const result = Object.values(groups);

    const meanN =
        result.reduce((sum,g)=>sum+g.rows.length,0) /
        result.length;

    const alpha = 0.4;

    result.forEach(g=>{

        Object.assign(g, calcStats(g.rows));

        g.freqWeight = Math.pow(g.n / meanN, alpha);

        g.score =
            Math.pow(g.vg + 1, 0.33) *
            Math.pow(g.ts + 1, 0.67) *
            Math.pow((g.ppt + 1) / 3, 1) *
            Math.pow(2 - g.tov, 1) *
            g.freqWeight;

    });

    const scores = result.map(g=>g.score);

    return {

        groups: result,

        colorScale:{

            min: Math.min(...scores),
            mean: scores.reduce((a,b)=>a+b,0)/scores.length,
            max: Math.max(...scores)

        }

    };

}

function calcColorScale(data){
  let filtered = [...data];
  if(rankingFilter==="pnr"){
    filtered = filtered.filter(r => r.focus?.includes("PnR"));
    if(transitionFilter){
      filtered = filtered.filter(r => r.transition_screen === transitionFilter);
    }
  }

  if(rankingFilter==="orb"){
    filtered = filtered.filter(r => r.possession_time != null);
  }

  const groups = {};

  filtered.forEach(r=>{
    let key = r.ranking_group || "(Sense focus)";

    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });

  const rows = Object.entries(groups).map(([name,list])=>{
    const s = calcStats(list);
    return {name,...s};
  });

  if(rows.length===0){
    return {min:0, mean:0, max:1};
  }

  const meanN = rows.reduce((s,r)=>s+r.n,0)/rows.length;
  const alpha = 0.8;

  rows.forEach(r=>{
    const freqWeight=Math.pow(r.n/meanN,alpha);
    r.score = Math.pow(r.vg+1,0.33) * Math.pow(r.ts+1,0.67) * Math.pow((r.ppt+1)/3,1) * Math.pow(2-r.tov,1) * freqWeight;
  });

  const scores = rows.map(r=>r.score);

  return{
    min:Math.min(...scores),
    mean:scores.reduce((a,b)=>a+b,0)/scores.length,
    max:Math.max(...scores)
  };

}


function renderRanking(
    data,
    overallStats,
    colorScale,
    rankingDiv = "globalRanking",
    statsDiv = "rankingStats"
){

    const compact = rankingDiv !== "globalRanking";
    const isDefense = selectedTeam === "DEFENSE";

    function getScoreColor(score, min, mean, max){

        let r,g,b;

        if(score<=mean){

            const t = mean===min ? 1 : (score-min)/(mean-min);
            const c = Math.max(0,Math.min(1,t));

            r=255;
            g=Math.round(255*c);
            b=Math.round(255*c);

        }else{

            const t = max===mean ? 1 : (score-mean)/(max-mean);
            const c = Math.max(0,Math.min(1,t));

            r=Math.round(255*(1-c));
            g=255;
            b=Math.round(255*(1-c));

        }

        return `rgb(${r},${g},${b})`;

    }

    let filtered=[...data];

    // ---------- FILTRES ----------

    if(rankingFilter==="pnr"){

        filtered=filtered.filter(g=>
            g.rows.some(r=>r.focus?.includes("PnR"))
        );

        renderTransitionButtons(
            filtered.flatMap(g=>g.rows)
        );

        if(transitionFilter){

            filtered=filtered.filter(g=>
                g.rows.some(r=>
                    r.transition_screen===transitionFilter
                )
            );

        }

    }else{

        document.getElementById("transitionButtons").innerHTML="";

    }

    if(rankingFilter==="orb"){

        filtered=filtered.filter(g=>

        isDefense ? a.score-b.score : b.score-a.score

    const topRows = compact ? globalSorted.slice(0, 5) : globalSorted;

        },

            key:"ppt",
            format:v=>v.toFixed(2)

    // ---------- TARGETES ----------

    document.getElementById(rankingDiv).innerHTML=

        const selected = selectedRanking===r.name;

             data-name="${r.name}|||${index}"
             style="
                flex:0 0 auto;

                border:${selected?"3px solid #1f6feb":"1px solid #ddd"};
                border-radius:10px;
                padding:${cardPadding};
                cursor:pointer;
                background:${selected?"#eef5ff":color};
                transition:.15s;
                color:${textColor};
             ">

            <div style="font-size:${rankSize};color:#777;font-weight:bold;">
                #${index+1}
            </div>

            <div style="margin-top:4px;font-weight:bold;font-size:${nameSize};">
                ${r.name}
            </div>

            <div style="margin-top:4px;font-size:${scoreSize};font-weight:bold;">
                ${r.score.toFixed(3)}
            </div>

        </div>`;

    }).join("");

    document.querySelectorAll(".global-card").forEach(card=>{
        card.onclick=()=>{
            window.selectRankingItem(card.dataset.name);
        };
    });

    // ---------- ESTADÍSTIQUES ----------

    if(statsDiv){

    console.log(statsDiv);
    console.log(document.getElementById(statsDiv));

        document.getElementById(statsDiv).innerHTML=

                        ? b.tov-a.tov

                    ? a[metric.key]-b[metric.key]

            });

            return `
            <div style="border:1px solid #ddd;border-radius:8px;padding:12px;background:white;">

                <div style="font-weight:bold;font-size:16px;">
                    ${metric.title}

                <div style="font-size:30px;font-weight:bold;margin-top:4px;">
                    ${metric.format(overallStats[metric.key])}
                </div>

                ${sorted.map((r,index)=>{

                    const selected=selectedRanking===r.name;

}


function buildPlayerGroups(rows){
    const groups = {};

    rows.forEach(r=>{

        let key;

        if(r.roller){
            key = `#${r.handlerNum} ${r.handler} - #${r.rollerNum} ${r.roller}`;
        }else{
            key = `#${r.handlerNum} ${r.handler}`;
        }

        if(!groups[key]){
            groups[key] = {
                name:key,
                rows:[]
            };
        }

        groups[key].rows.push(r);
    });

    return Object.values(groups).map(g=>{
        const s = calcStats(g.rows);

        return {
            ...g,
            ...s
        };
    });
}

window.selectRankingItem = function(raw){
    const name = raw.split("|||")[0];

    if(selectedRanking === name){
        selectedRanking = null;
    }else{
        selectedRanking = name;
    }

    loadData();
};
