<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    select {
      padding: 6px;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>

<body>

<h2>Actions Dashboard</h2>

<!-- 🔥 SELECTOR EQUIPS -->
<div id="teamToggles"></div>

<h3>Dades generals</h3>

<div id="generalStats" style="
display:flex;
gap:15px;
margin:15px 0;
flex-wrap:wrap;
"></div>

<div id="status">Carregant...</div>

<table id="table">
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://atajqbhztjssgplygarb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YWpxYmh6dGpzc2dwbHlnYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTg0OTEsImV4cCI6MjA5NDc3NDQ5MX0.8m7Qfh_5s2-4Bg92NXISG_w49myAYnmASOWrUR66I9Q"
);

let selectedTeam = "";

/* ---------------------------
   RENDER TAULA
---------------------------- */
function renderTable(data) {
  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td>No data</td></tr>";
    thead.innerHTML = "";
    return;
  }

  const keys = Object.keys(data[0]);

  thead.innerHTML =
    "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row => {
    return "<tr>" + keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") + "</tr>";
  }).join("");
}

function renderGeneralStats(data) {

  const total = data.length;

  const generatedAdvantage =
    data.filter(r => r.generated_advantage).length;

  const noFalta = data.filter(
    r => r.result !== "FALTA SIN TIROS"
  );

  const selectedShot =
    noFalta.filter(r => r.selected_shot).length;

  const shots = data.filter(r =>
    r.result?.includes("2") || r.result?.includes("3")
  );

  const points =
    data.reduce((sum, r) => {

      if (r.result === "2+" || r.result === "2+1")
        return sum + 2;

      if (r.result === "3+" || r.result === "3+1")
        return sum + 3;

      return sum;

    }, 0);

  const turnovers =
    data.filter(r => r.result === "TO").length;

  const poss =
    data.filter(r =>
      r.result === "TO" ||
      r.result?.includes("2") ||
      r.result?.includes("3")
    );

  const stats = [
    {
      title: "% Ventajas generadas",
      value: total ? (generatedAdvantage / total * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "% Tiros elegidos",
      value: noFalta.length ? (selectedShot / noFalta.length * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "Puntos por tiro",
      value: shots.length ? (points / shots.length).toFixed(2) : "-"
    },
    {
      title: "TO%",
      value: poss.length ? (turnovers / poss.length * 100).toFixed(1) + "%" : "-"
    }
  ];

  document.getElementById("generalStats").innerHTML =
    stats.map(s => `
      <div style="
        border:1px solid #ddd;
        border-radius:8px;
        padding:15px;
        min-width:170px;
        text-align:center;
        background:#fafafa;
      ">
        <div style="
          font-size:13px;
          color:#666;
        ">
          ${s.title}
        </div>

        <div style="
          font-size:28px;
          font-weight:bold;
          margin-top:8px;
        ">
          ${s.value}
        </div>
      </div>
    `).join("");
}

function renderTeamToggles(teams) {
  const container = document.getElementById("teamToggles");
  container.innerHTML = "";

  teams.forEach(team => {
    const btn = document.createElement("button");

    btn.innerText = team.name;
    btn.style.marginRight = "8px";
    btn.style.padding = "6px 10px";
    btn.style.cursor = "pointer";

    btn.onclick = () => {
      selectedTeam = team.uuid;

      // UI highlight
      [...container.children].forEach(b => b.style.background = "");
      btn.style.background = "#ddd";

      loadData();
    };

    container.appendChild(btn);
  });
}

/* ---------------------------
   DATA AVUI
---------------------------- */
function getToday() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ---------------------------
   CARREGAR EQUIPS
---------------------------- */
async function loadTeams() {
  const today = getToday();

  const { data, error } = await supabase
    .from("actions")
    .select(`
      spain_role,
      games!inner(
        date
      )
    `)
    .ilike("games.date", `${today}%`)
    .limit(200);

  if (error) {
    console.error(error);
    return;
  }

  // 🔥 extreure equips únics
  const map = new Map();

  data.forEach(r => {
    if (r.spain_role) {
      map.set(r.spain_role, {
        uuid: r.spain_role,
        name: r.spain_role
      });
    }
  });

  const teams = Array.from(map.values()).slice(0, 2); // 🔥 limit 2

  renderTeamToggles(teams);
}

/* ---------------------------
   CARREGAR ACTIONS
---------------------------- */
async function loadData() {
  document.getElementById("status").innerText = "Actualitzant...";

  const today = getToday();

  let query = supabase
    .from("actions")
    .select(`
      *,
      games!inner(date),
      team:teams!actions_team_uuid_fkey(name),
      handler:players!actions_handler_uuid_fkey(name),
      roller:players!actions_roller_uuid_fkey(name)
    `)
    .ilike("games.date", `${today}%`)
    .order("id", { ascending: false });

  // 🔥 filtre per equip
  if (selectedTeam) {
    query = query.eq("spain_role", selectedTeam);
  }

  const { data, error } = await query;

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error carregant dades";
    return;
  }

  const clean = data.map(r => ({
    ...r,
    team: r.team?.name,
    date: r.games?.date,
    handler: r.handler?.name,
    roller: r.roller?.name
  }));

  renderGeneralStats(clean);

  renderTable(clean);
  document.getElementById("status").innerText =
    `OK - ${data.length} registres`;
}

/* ---------------------------
   INIT
---------------------------- */
loadTeams();
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
