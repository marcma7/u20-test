<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    select {
      padding: 6px;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

.toggle-btn{
    padding:8px 14px;
    margin-right:8px;
    margin-bottom:8px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    border-radius:6px;
    transition:.15s;
}

.toggle-btn:hover{
    background:#f3f3f3;
}

.toggle-btn.active{
    background:#1f6feb;
    color:white;
    border-color:#1f6feb;
}
  </style>
</head>

<body>
<h2>Directo España U20</h2>

<h3 style="margin-bottom:8px;">Filtros</h3>
<div style="display:flex; gap:40px; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap;">

<div>
  <div style="font-size:13px; color:#666; margin-bottom:6px; font-weight:bold;">Rol del equipo</div>
  
  <div id="teamToggles" style="margin-bottom:25px;"></div>
</div>

<div>
  <div style="font-size:13px; color:#666; margin-bottom:6px; font-weight:bold;">Agrupar por</div>
  
  <div id="modeButtons">
    <button id="bySpacing" class="toggle-btn">SPACING</button>
    <button id="byPair" class="toggle-btn">JUGADOR/ES</button>
  </div>
</div>

<div>
  <div style="font-size:13px; color:#666; margin-bottom:6px; font-weight:bold;">Tipo de acciones</div>

  <div id="filterButtons">
    <button id="onlyAll" class="toggle-btn">TODOS</button>
    <button id="onlyPnR" class="toggle-btn">SÓLO P&R</button>
    <button id="onlyORB" class="toggle-btn">SÓLO TRAS ORB</button>
  </div>
</div>

<div id="transitionButtonsContainer" style="display:none;">
  <div style="font-size:13px; color:#666; margin-bottom:6px; font-weight:bold;">Tipo de bloqueo</div>

  <div id="transitionButtons"></div>
</div>
</div>

<h3 style="margin-bottom:8px;">Datos generales</h3>
<div id="generalStats" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px;"></div>

<h3 style="margin-top:30px;margin-bottom:10px;">Ranking global</h3>
<div id="globalRanking" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; "></div>

<div id="rankingStats" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px;"></div>

<div id="status">Carregant...</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://atajqbhztjssgplygarb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YWpxYmh6dGpzc2dwbHlnYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTg0OTEsImV4cCI6MjA5NDc3NDQ5MX0.8m7Qfh_5s2-4Bg92NXISG_w49myAYnmASOWrUR66I9Q"
);

let selectedTeam = "OFFENSE";
let rankingMode = "spacing";   // spacing | pair
let rankingFilter = "all";     // all | pnr | orb
const isDefense = selectedTeam === "DEFENSE";
let transitionFilter = "";
let selectedRanking = null;

/* ---------------------------
   RENDER TAULA
---------------------------- */
function refreshRankingButtons(){

  document.querySelectorAll("#modeButtons button").forEach(b=>b.classList.remove("active"));

  document.querySelectorAll("#filterButtons button").forEach(b=>b.classList.remove("active"));

  if(rankingMode=="spacing")
    bySpacing.classList.add("active");
  else
    byPair.classList.add("active");

  if(rankingFilter=="all")
    onlyAll.classList.add("active");

  if(rankingFilter=="pnr")
    onlyPnR.classList.add("active");

  if(rankingFilter=="orb")
    onlyORB.classList.add("active");

  transitionButtonsContainer.style.display = rankingFilter === "pnr" ? "block" : "none";
    
  if (rankingFilter !== "pnr") {
    transitionFilter = "";
  }
}

function renderTable(data) {
  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td>No data</td></tr>";
    thead.innerHTML = "";
    return;
  }

  const keys = Object.keys(data[0]);

  thead.innerHTML = "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row => {
    return "<tr>" + keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") + "</tr>";
  }).join("");
}

function renderGeneralStats(data) {

  const total = data.length;
  const generatedAdvantage = data.filter(r => r.generated_advantage).length;
  const noFalta = data.filter(r => r.result !== "FALTA SIN TIROS");
  const selectedShot = noFalta.filter(r => r.selected_shot).length;
  const shots = data.filter(r => r.result?.includes("2") || r.result?.includes("3"));

  const points =
    data.reduce((sum, r) => {

      if (r.result === "2+" || r.result === "2+1")
        return sum + 2;

      if (r.result === "3+" || r.result === "3+1")
        return sum + 3;

      return sum;
    }, 0);

  const turnovers = data.filter(r => r.result === "TO").length;

  const poss =
    data.filter(r =>
      r.result === "TO" ||
      r.result?.includes("2") ||
      r.result?.includes("3")
    );

  const stats = [
    {
      title: "% Ventajas generadas",
      value: total ? (generatedAdvantage / total * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "% Tiros elegidos",
      value: noFalta.length ? (selectedShot / noFalta.length * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "Puntos por tiro",
      value: shots.length ? (points / shots.length).toFixed(2) : "-"
    },
    {
      title: "TO%",
      value: poss.length ? (turnovers / poss.length * 100).toFixed(1) + "%" : "-"
    }
  ];

  document.getElementById("generalStats").innerHTML =
    stats.map(s => `<div style="border:1px solid #ddd; border-radius:8px; padding:15px; min-width:170px; text-align:center; background:#fafafa;">
        <div style="font-size:13px; color:#666;">
          ${s.title}
        </div>

        <div style="font-size:28px; font-weight:bold; margin-top:8px;">
          ${s.value}
        </div>
      </div>
    `).join("");
}


function renderTransitionButtons(rows){
  
  const container=document.getElementById("transitionButtons");

  container.innerHTML="";

  // Botó TODOS
  const all=document.createElement("button");

  all.className="toggle-btn";
  all.innerText="TODOS";

  if(transitionFilter==="")
    all.classList.add("active");

    all.onclick=()=>{
        transitionFilter="";
        renderTransitionButtons(rows);
        loadData();
    };

    container.appendChild(all);

    // Altres valors
    const values=[
        ...new Set(
            rows
                .map(r=>r.transition_screen)
                .filter(v=>v)
        )
    ];

    values.forEach(value=>{
        const btn=document.createElement("button");
        btn.className="toggle-btn";
        btn.innerText=value;

        if(value===transitionFilter)
            btn.classList.add("active");

        btn.onclick=()=>{
            transitionFilter=value;
            renderTransitionButtons(rows);
            loadData();
        };

        container.appendChild(btn);
    });

}


function renderTeamToggles(teams) {

    const container = document.getElementById("teamToggles");
    container.innerHTML = "";

    teams.forEach(team => {

        const btn = document.createElement("button");

        btn.innerText = team.name;
        btn.className = "toggle-btn";

        if (team.uuid === selectedTeam) {
            btn.classList.add("active");
        }

        btn.onclick = () => {

            selectedTeam = team.uuid;
            [...container.children].forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadData();

        };

        container.appendChild(btn);

    });

}


/* ---------------------------
   DATA AVUI
---------------------------- */
function getToday() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}


/* ---------------------------
   CARREGAR EQUIPS
---------------------------- */
async function loadTeams() {
  refreshRankingButtons();
  const today = getToday();

  const { data, error } = await supabase
    .from("actions")
    .select(`
      spain_role,
      games!inner(
        date
      )
    `)
    .ilike("games.date", `${today}%`)
    .limit(200);

  if (error) {
    console.error(error);
    return;
  }

  const map = new Map();

  data.forEach(r => {
    if (r.spain_role) {
      map.set(r.spain_role, {uuid: r.spain_role, name: r.spain_role});
    }
  });

  const teams = Array.from(map.values()).slice(0, 2);

  renderTeamToggles(teams);
}

bySpacing.onclick=()=>{

  rankingMode="spacing";
  refreshRankingButtons();
  loadData();

};

byPair.onclick=()=>{

  rankingMode="pair";
  refreshRankingButtons();
  loadData();

};

onlyAll.onclick=()=>{

  rankingFilter="all";
  refreshRankingButtons();
  loadData();

};

onlyPnR.onclick=()=>{

  rankingFilter="pnr";
  refreshRankingButtons();
  loadData();

};

onlyORB.onclick=()=>{

  rankingFilter="orb";
  refreshRankingButtons();
  loadData();

};

/* ---------------------------
   CARREGAR ACTIONS
---------------------------- */
async function loadData() {
  document.getElementById("status").innerText = "Actualitzant...";

  const today = getToday();

  let query = supabase
    .from("actions")
    .select(`
      *,
      games!inner(date),
      team:teams!actions_team_uuid_fkey(name),
      handler:players!actions_handler_uuid_fkey(name),
      roller:players!actions_roller_uuid_fkey(name)
    `)
    .ilike("games.date", `${today}%`)
    .order("id", { ascending: false });

  // 🔥 filtre per rol
  if (selectedTeam) {
    query = query.eq("spain_role", selectedTeam);
  }

  const { data, error } = await query;

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error carregant dades";
    return;
  }

  const clean = data.map(r => ({
    ...r,
    team: r.team?.name,
    date: r.games?.date,
    handler: r.handler?.name,
    roller: r.roller?.name
  }));

  const overallStats = calcStats(clean);

  renderGeneralStats(clean);
  renderRanking(clean, overallStats);
  
  document.getElementById("status").innerText =
    `OK - ${data.length} registres`;
}


function calcStats(rows){

  const total=rows.length;
  const vg=rows.filter(r=>r.generated_advantage).length;
  const noFalta=rows.filter(r=>r.result!="FALTA SIN TIROS");
  const ts=noFalta.filter(r=>r.selected_shot).length;
  const tiros=rows.filter(r=> r.result?.includes("2") || r.result?.includes("3"));
  
  const pts=rows.reduce((s,r)=>{

        if(r.result=="2+"||r.result=="2+1") return s+2;
        if(r.result=="3+"||r.result=="3+1") return s+3;

        return s;
    },0);

  const tov=rows.filter(r=>r.result=="TO").length;

  const poss=rows.filter(r=> r.result=="TO" || r.result?.includes("2") || r.result?.includes("3"));

  return{
    n: total,
    vg:total?vg/total:0,
    ts:noFalta.length?ts/noFalta.length:0,
    ppt:tiros.length?pts/tiros.length:0,
    tov:poss.length?tov/poss.length:0
  }

}


function renderRanking(data, overallStats){

  function getScoreColor(score) {
    // clamp
    const s = Math.max(0, Math.min(2, score));

    let r, g, b;

    if (s < 1) {
      // vermell -> blanc
      const t = s / 1;
      r = 255;
      g = Math.round(255 * t);
      b = Math.round(255 * t);
    } else {
      // blanc -> verd
      const t = (s - 1) / 1;
      r = Math.round(255 * (1 - t));
      g = 255;
      b = Math.round(255 * (1 - t));
    }

    return `rgb(${r},${g},${b})`;
  }

  let filtered=[...data];
  const isDefense = selectedTeam === "DEFENSE";

  if(rankingFilter==="pnr") {

    filtered=filtered.filter(r=> r.focus?.includes("PnR"));
    renderTransitionButtons(filtered);

    if(transitionFilter) {

      filtered=filtered.filter(r=> r.transition_screen===transitionFilter);

    }
  }

  if(rankingFilter!=="pnr"){
    document.getElementById("transitionButtons").innerHTML="";
  }

  if(rankingFilter==="orb"){
    filtered=filtered.filter(r=>r.possession_time!=null);
  }

  const groups={};

  filtered.forEach(r=>{

    let key;

    if(rankingMode==="spacing"){

      key=r.focus || "(Sense focus)";

    }else{

      if(r.roller){

        key=`${r.handler} - ${r.roller}`;

      }else{

        key=`${r.handler} (${r.focus})`;

      }
    }

    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });

  const rows = Object.entries(groups).map(([name,list])=>{

    const s = calcStats(list);

    return {name, ...s};

  });

  const meanN = rows.reduce((sum, r) => sum + r.n, 0) / rows.length;
  const alpha = 0.1;

  rows.forEach(r => {
    const freqWeight = Math.pow(r.n / meanN, alpha);

    r.score = Math.pow(r.vg + 1, 0.33) * Math.pow(r.ts + 1, 0.67) * Math.pow((r.ppt + 1) / 3, 1) * Math.pow(2 - r.tov, 1) * freqWeight;
  });

  const globalSorted=[...rows].sort((a,b)=> isDefense ? a.score-b.score : b.score-a.score);

  const metrics=[
    {
      title:"Ventajas generadas",
      key:"vg",
      format:v=>(v*100).toFixed(1)+"%"
    },

    {
      title:"Tiros elegidos",
      key:"ts",
      format:v=>(v*100).toFixed(1)+"%"
    },

    {
      title:"Puntos por tiro",
      key:"ppt",
      format:v=>v.toFixed(2)
    },

    {
      title:"TO%",
      key:"tov",
      format:v=>(v*100).toFixed(1)+"%"
    }
  ];

  document.getElementById("globalRanking").innerHTML=
  globalSorted.map((r,index)=>
  {
    const selected = selectedRanking===r.name;
    const color = getScoreColor(r.score);

    const textColor = r.score > 1.4 ? "#0b1b0b" : "#111";
    
    return`
      <div class="global-card" data-name="${r.name}" style="flex:0 0 auto; width:130px; border:${selected?"3px solid #1f6feb":"1px solid #ddd"}; border-radius:10px; padding:12px; cursor:pointer; background:${selected?"#eef5ff":color}; transform:none; transition:.15s; color:${textColor}">
	<div style="font-size:13px; color:#777; font-weight:bold;">#${index+1}</div>
	<div style="margin-top:8px; font-weight:bold; font-size:17px;">${r.name}</div>
	<div style="margin-top:8px; font-size:26px; font-weight:bold;">${r.score.toFixed(3)}</div>
      </div>`;
  }).join("");

  document.querySelectorAll(".global-card").forEach(card => 
  {
    card.onclick = () => {
      window.selectRankingItem(card.dataset.name);
    };
  });

  document.getElementById("rankingStats").innerHTML= 
    metrics.map(metric=>{
      
      const sorted=[...rows].sort((a,b)=>{
        if(metric.key==="tov"){
          
	  return isDefense ? b.tov-a.tov : a.tov-b.tov;
    	
	}

	return isDefense ? a[metric.key]-b[metric.key] : b[metric.key]-a[metric.key];
    });

  return `<div style="border:1px solid #ddd; border-radius:8px; padding:12px; background:white;">
  	    <div style="font-weight:bold; font-size:16px; ">
              ${metric.title}
            </div>

	    <div style="font-size:30px; font-weight:bold; margin-top:4px;">${metric.format(filtered.length ? calcStats(filtered)[metric.key] : 0)}
		${(()=>{
		  const filteredValue = filtered.length? calcStats(filtered)[metric.key] : 0;

		  const generalValue = overallStats[metric.key];

	  	  let color="#999";
		  if(metric.key==="tov"){

		    if(isDefense){
		      if(filteredValue>generalValue)
            		color="#2e7d32";
        	      else if(filteredValue<generalValue)
            		color="#d32f2f";

		    }else{

  		      if(filteredValue<generalValue)
            	        color="#2e7d32";
        	      else if(filteredValue>generalValue)
	                color="#d32f2f";
  		    }
		  }else{

		    if(isDefense){
		      if(filteredValue<generalValue)
			color="#2e7d32";
        	      else if(filteredValue>generalValue)
			color="#d32f2f";

    		}else{

		  if(filteredValue>generalValue)
            	    color="#2e7d32";
        	  else if(filteredValue<generalValue)
            	    color="#d32f2f";

		}
	      }
	      
	      return `<span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:${color}; margin-left:8px; vertical-align:middle; "></span>`;
	    })()}
	    </span>
          </div>

	  ${sorted.map((r,index)=>{
	    let better;

	    if(metric.key==="tov"){
	
	      better = isDefense ? r.tov > overallStats.tov : r.tov < overallStats.tov;

	    }else{

	      better = isDefense ? r[metric.key] < overallStats[metric.key] : r[metric.key] > overallStats[metric.key];

	    }

	    const equal=Math.abs(r[metric.key]-overallStats[metric.key])<0.0001;

	    const color=equal ? "#666" : better ? "#1b8f3c" : "#d93025";
	    const delta = r[metric.key] - overallStats[metric.key];

  	    const selected = selectedRanking === r.name;
	    let fontSize = "13px";

	    if(index === 0) fontSize = "16px";
	    else if(index === 1) fontSize = "15px";
	    else if(index === 2) fontSize = "14px";

	    return `<div onclick="window.selectRankingItem('${r.name}')" style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #eee; padding:8px 0; cursor:pointer; background:${selected ? "#eaf3ff" : "transparent"}; border-radius:6px; transition:.15s;">
		      <div>
			<div style="font-size:${fontSize}; font-weight:${selected ? "700" : "500"};">${r.name}</div>

			<div style="font-size:11px; color:#777;">${r.n} ${r.n==1?"acción":"acciones"}</div>
		      </div>

		      <div style="text-align:right;">
			<div style="font-weight:bold; color:${color};">${metric.format(r[metric.key])}</div>
			<div style="font-size:11px; color:${color};">${metric.key==="ppt" ? `${delta>=0?"+":""}${delta.toFixed(2)}` : `${delta>=0?"+":""}${(delta*100).toFixed(1)}`}</div>
		      </div>
		    </div>`;
		  }).join("")}
		</div>`;
	}).join("");
}

window.selectRankingItem = function(name){

    if(selectedRanking === name){
        selectedRanking = null;
    }else{
        selectedRanking = name;
    }

    loadData();

};

/* ---------------------------
   INIT
---------------------------- */
loadTeams();
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
