<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    select {
      padding: 6px;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>

<body>

<h2>Actions Dashboard</h2>

<!-- 🔥 SELECTOR EQUIPS -->
<div id="teamToggles"></div>

<div id="status">Carregant...</div>

<table id="table">
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://atajqbhztjssgplygarb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YWpxYmh6dGpzc2dwbHlnYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTg0OTEsImV4cCI6MjA5NDc3NDQ5MX0.8m7Qfh_5s2-4Bg92NXISG_w49myAYnmASOWrUR66I9Q"
);

let selectedTeam = "";

/* ---------------------------
   RENDER TAULA
---------------------------- */
function renderTable(data) {
  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td>No data</td></tr>";
    thead.innerHTML = "";
    return;
  }

  const keys = Object.keys(data[0]);

  thead.innerHTML =
    "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row => {
    return "<tr>" + keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") + "</tr>";
  }).join("");
}

function renderTeamToggles(teams) {
  const container = document.getElementById("teamToggles");
  container.innerHTML = "";

  teams.forEach(team => {
    const btn = document.createElement("button");

    btn.innerText = team.name;
    btn.style.marginRight = "8px";
    btn.style.padding = "6px 10px";
    btn.style.cursor = "pointer";

    btn.onclick = () => {
      selectedTeam = team.uuid;

      // UI highlight
      [...container.children].forEach(b => b.style.background = "");
      btn.style.background = "#ddd";

      loadData();
    };

    container.appendChild(btn);
  });
}

/* ---------------------------
   DATA AVUI
---------------------------- */
function getToday() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ---------------------------
   CARREGAR EQUIPS
---------------------------- */
async function loadTeams() {
  const today = getToday();

  const { data, error } = await supabase
    .from("actions")
    .select(`
      games!inner(
        date,
        home_team:teams!games_home_team_uuid_fkey(uuid, name),
        away_team:teams!games_away_team_uuid_fkey(uuid, name)
      )
    `)
    .ilike("games.date", `${today}%`)
    .limit(200);

  if (error) {
    console.error(error);
    return;
  }

  // 🔥 extreure equips únics
  const map = new Map();

  data.forEach(r => {
    const home = r.games?.home_team;
    const away = r.games?.away_team;

    if (home) map.set(home.uuid, home);
    if (away) map.set(away.uuid, away);
  });

  const teams = Array.from(map.values()).slice(0, 2); // 🔥 limit 2

  renderTeamToggles(teams);
}

/* ---------------------------
   CARREGAR ACTIONS
---------------------------- */
async function loadData() {
  document.getElementById("status").innerText = "Actualitzant...";

  const today = getToday();

  let query = supabase
    .from("actions")
    .select(`
      *,
      games!inner(date),
      team:teams!actions_team_uuid_fkey(name)
    `)
    .ilike("games.date", `${today}%`)
    .order("id", { ascending: false });

  // 🔥 filtre per equip
  if (selectedTeam) {
    query = query.eq("team_uuid", selectedTeam);
  }

  const { data, error } = await query;

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error carregant dades";
    return;
  }

  const clean = data.map(r => ({
    ...r,
    team: r.team?.name,
    date: r.games?.date
  }));

  renderTable(clean);
  document.getElementById("status").innerText =
    `OK - ${data.length} registres`;
}

/* ---------------------------
   INIT
---------------------------- */
loadTeams();
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
