<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    select {
      padding: 6px;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

.toggle-btn{
    padding:8px 14px;
    margin-right:8px;
    margin-bottom:8px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    border-radius:6px;
    transition:.15s;
}

.toggle-btn:hover{
    background:#f3f3f3;
}

.toggle-btn.active{
    background:#1f6feb;
    color:white;
    border-color:#1f6feb;
}
  </style>
</head>

<body>

<h2>Directo España U20</h2>

<h3 style="margin-bottom:8px;">Tipo de análisis</h3>
<div id="teamToggles" style="margin-bottom:25px;"></div>

<h3 style="margin-bottom:8px;">Datos generales</h3>

<div id="generalStats" style="
display:flex;
gap:15px;
margin:15px 0;
flex-wrap:wrap;
"></div>


<h3 style="margin-bottom:8px;">Rankings</h3>
<div style="
display:flex;
gap:40px;
align-items:flex-start;
margin-bottom:20px;
flex-wrap:wrap;
">

    <div>

        <div style="
            font-size:13px;
            color:#666;
            margin-bottom:6px;
            font-weight:bold;
        ">
            Agrupar por
        </div>

        <div id="modeButtons">

            <button id="bySpacing" class="toggle-btn">POR SPACING</button>
            <button id="byPair" class="toggle-btn">POR JUGADOR/ES</button>

        </div>

    </div>

    <div>

        <div style="
            font-size:13px;
            color:#666;
            margin-bottom:6px;
            font-weight:bold;
        ">
            Filtrar
        </div>

        <div id="filterButtons">

            <button id="onlyAll" class="toggle-btn">TODOS</button>
            <button id="onlyPnR" class="toggle-btn">SÓLO P&R</button>
            <button id="onlyORB" class="toggle-btn">SÓLO TRAS ORB</button>

        </div>

    </div>

</div>


<div id="rankingStats"
style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
"></div>

<div id="status">Carregant...</div>

<table id="table">
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://atajqbhztjssgplygarb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YWpxYmh6dGpzc2dwbHlnYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTg0OTEsImV4cCI6MjA5NDc3NDQ5MX0.8m7Qfh_5s2-4Bg92NXISG_w49myAYnmASOWrUR66I9Q"
);

let selectedTeam = "OFFENSE";
let rankingMode = "spacing";   // spacing | pair
let rankingFilter = "all";     // all | pnr | orb
const isDefense = selectedTeam === "DEFENSE";

/* ---------------------------
   RENDER TAULA
---------------------------- */
function refreshRankingButtons(){

    document.querySelectorAll("#modeButtons button")
    .forEach(b=>b.classList.remove("active"));

document.querySelectorAll("#filterButtons button")
    .forEach(b=>b.classList.remove("active"));

    if(rankingMode=="spacing")
        bySpacing.classList.add("active");
    else
        byPair.classList.add("active");

    if(rankingFilter=="all")
        onlyAll.classList.add("active");

    if(rankingFilter=="pnr")
        onlyPnR.classList.add("active");

    if(rankingFilter=="orb")
        onlyORB.classList.add("active");

}

function renderTable(data) {
  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td>No data</td></tr>";
    thead.innerHTML = "";
    return;
  }

  const keys = Object.keys(data[0]);

  thead.innerHTML =
    "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row => {
    return "<tr>" + keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") + "</tr>";
  }).join("");
}

function renderGeneralStats(data) {

  const total = data.length;

  const generatedAdvantage =
    data.filter(r => r.generated_advantage).length;

  const noFalta = data.filter(
    r => r.result !== "FALTA SIN TIROS"
  );

  const selectedShot =
    noFalta.filter(r => r.selected_shot).length;

  const shots = data.filter(r =>
    r.result?.includes("2") || r.result?.includes("3")
  );

  const points =
    data.reduce((sum, r) => {

      if (r.result === "2+" || r.result === "2+1")
        return sum + 2;

      if (r.result === "3+" || r.result === "3+1")
        return sum + 3;

      return sum;

    }, 0);

  const turnovers =
    data.filter(r => r.result === "TO").length;

  const poss =
    data.filter(r =>
      r.result === "TO" ||
      r.result?.includes("2") ||
      r.result?.includes("3")
    );

  const stats = [
    {
      title: "% Ventajas generadas",
      value: total ? (generatedAdvantage / total * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "% Tiros elegidos",
      value: noFalta.length ? (selectedShot / noFalta.length * 100).toFixed(1) + "%" : "-"
    },
    {
      title: "Puntos por tiro",
      value: shots.length ? (points / shots.length).toFixed(2) : "-"
    },
    {
      title: "TO%",
      value: poss.length ? (turnovers / poss.length * 100).toFixed(1) + "%" : "-"
    }
  ];

  document.getElementById("generalStats").innerHTML =
    stats.map(s => `
      <div style="
        border:1px solid #ddd;
        border-radius:8px;
        padding:15px;
        min-width:170px;
        text-align:center;
        background:#fafafa;
      ">
        <div style="
          font-size:13px;
          color:#666;
        ">
          ${s.title}
        </div>

        <div style="
          font-size:28px;
          font-weight:bold;
          margin-top:8px;
        ">
          ${s.value}
        </div>
      </div>
    `).join("");
}

function renderTeamToggles(teams) {

    const container = document.getElementById("teamToggles");
    container.innerHTML = "";

    teams.forEach(team => {

        const btn = document.createElement("button");

        btn.innerText = team.name;
        btn.className = "toggle-btn";

        if (team.uuid === selectedTeam) {
            btn.classList.add("active");
        }

        btn.onclick = () => {

            selectedTeam = team.uuid;

            [...container.children].forEach(b =>
                b.classList.remove("active")
            );

            btn.classList.add("active");

            loadData();

        };

        container.appendChild(btn);

    });

}

/* ---------------------------
   DATA AVUI
---------------------------- */
function getToday() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ---------------------------
   CARREGAR EQUIPS
---------------------------- */
async function loadTeams() {
refreshRankingButtons();
  const today = getToday();

  const { data, error } = await supabase
    .from("actions")
    .select(`
      spain_role,
      games!inner(
        date
      )
    `)
    .ilike("games.date", `${today}%`)
    .limit(200);

  if (error) {
    console.error(error);
    return;
  }

  // 🔥 extreure equips únics
  const map = new Map();

  data.forEach(r => {
    if (r.spain_role) {
      map.set(r.spain_role, {
        uuid: r.spain_role,
        name: r.spain_role
      });
    }
  });

  const teams = Array.from(map.values()).slice(0, 2); // 🔥 limit 2

  renderTeamToggles(teams);
}

bySpacing.onclick=()=>{

    rankingMode="spacing";

    refreshRankingButtons();

    loadData();

};

byPair.onclick=()=>{

    rankingMode="pair";

    refreshRankingButtons();

    loadData();

};

onlyAll.onclick=()=>{

    rankingFilter="all";

    refreshRankingButtons();

    loadData();

};

onlyPnR.onclick=()=>{

    rankingFilter="pnr";

    refreshRankingButtons();

    loadData();

};

onlyORB.onclick=()=>{

    rankingFilter="orb";

    refreshRankingButtons();

    loadData();

};

/* ---------------------------
   CARREGAR ACTIONS
---------------------------- */
async function loadData() {
  document.getElementById("status").innerText = "Actualitzant...";

  const today = getToday();

  let query = supabase
    .from("actions")
    .select(`
      *,
      games!inner(date),
      team:teams!actions_team_uuid_fkey(name),
      handler:players!actions_handler_uuid_fkey(name),
      roller:players!actions_roller_uuid_fkey(name)
    `)
    .ilike("games.date", `${today}%`)
    .order("id", { ascending: false });

  // 🔥 filtre per equip
  if (selectedTeam) {
    query = query.eq("spain_role", selectedTeam);
  }

  const { data, error } = await query;

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error carregant dades";
    return;
  }

  const clean = data.map(r => ({
    ...r,
    team: r.team?.name,
    date: r.games?.date,
    handler: r.handler?.name,
    roller: r.roller?.name
  }));

  const overallStats = calcStats(clean);

  renderGeneralStats(clean);
  renderRanking(clean, overallStats);
  
  document.getElementById("status").innerText =
    `OK - ${data.length} registres`;
}

function calcStats(rows){

    const total=rows.length;

    const vg=rows.filter(r=>r.generated_advantage).length;

    const noFalta=rows.filter(r=>r.result!="FALTA SIN TIROS");

    const ts=noFalta.filter(r=>r.selected_shot).length;

    const tiros=rows.filter(r=>
        r.result?.includes("2") ||
        r.result?.includes("3")
    );

    const pts=rows.reduce((s,r)=>{

        if(r.result=="2+"||r.result=="2+1") return s+2;
        if(r.result=="3+"||r.result=="3+1") return s+3;

        return s;

    },0);

    const tov=rows.filter(r=>r.result=="TO").length;

    const poss=rows.filter(r=>
        r.result=="TO" ||
        r.result?.includes("2") ||
        r.result?.includes("3")
    );

    return{

        n: total,

        vg:total?vg/total:0,

        ts:noFalta.length?ts/noFalta.length:0,

        ppt:tiros.length?pts/tiros.length:0,

        tov:poss.length?tov/poss.length:0

    }

}

function renderRanking(data, overallStats){

    let filtered=[...data];
    const isDefense = selectedTeam === "DEFENSE";

    if(rankingFilter==="pnr"){
        filtered=filtered.filter(r=>r.focus?.includes("PnR"));
    }

    if(rankingFilter==="orb"){
        filtered=filtered.filter(r=>r.possession_time!=null);
    }

    const groups={};

    filtered.forEach(r=>{

        let key;

        if(rankingMode==="spacing"){

            key=r.focus || "(Sense focus)";

        }else{

            if(r.roller){

                key=`${r.handler} - ${r.roller}`;

            }else{

                key=`${r.handler} (${r.focus})`;

            }

        }

        if(!groups[key]) groups[key]=[];

        groups[key].push(r);

    });

    const rows=Object.entries(groups).map(([name,list])=>({

        name,

        ...calcStats(list)

    }));

    const metrics=[

        {
            title:"Ventajas generadas",
            key:"vg",
            format:v=>(v*100).toFixed(1)+"%"
        },

        {
            title:"Tiros elegidos",
            key:"ts",
            format:v=>(v*100).toFixed(1)+"%"
        },

        {
            title:"Puntos por tiro",
            key:"ppt",
            format:v=>v.toFixed(2)
        },

        {
            title:"TO%",
            key:"tov",
            format:v=>(v*100).toFixed(1)+"%"
        }

    ];

    document.getElementById("rankingStats").innerHTML=
        metrics.map(metric=>{

            const sorted=[...rows].sort((a,b)=>{

    if(metric.key==="tov"){

        return isDefense
            ? b.tov-a.tov
            : a.tov-b.tov;

    }

    return isDefense
        ? a[metric.key]-b[metric.key]
        : b[metric.key]-a[metric.key];

});

            return `

            <div style="
                border:1px solid #ddd;
                border-radius:8px;
                padding:12px;
                background:white;
            ">

                <div style="
                    font-weight:bold;
                    font-size:16px;
                ">
                    ${metric.title}
                </div>

                <div style="
                    font-size:30px;
                    font-weight:bold;
                    margin-top:4px;
                ">
                    ${metric.format(filtered.length ? calcStats(filtered)[metric.key] : 0)}

${(()=>{
    const filteredValue = filtered.length
        ? calcStats(filtered)[metric.key]
        : 0;

    const generalValue = overallStats[metric.key];

   let color="#999";

if(metric.key==="tov"){

    if(isDefense){

        if(filteredValue>generalValue)
            color="#2e7d32";
        else if(filteredValue<generalValue)
            color="#d32f2f";

    }else{

        if(filteredValue<generalValue)
            color="#2e7d32";
        else if(filteredValue>generalValue)
            color="#d32f2f";

    }

}else{

    if(isDefense){

        if(filteredValue<generalValue)
            color="#2e7d32";
        else if(filteredValue>generalValue)
            color="#d32f2f";

    }else{

        if(filteredValue>generalValue)
            color="#2e7d32";
        else if(filteredValue<generalValue)
            color="#d32f2f";

    }

}

    return `
        <span style="
            display:inline-block;
            width:12px;
            height:12px;
            border-radius:50%;
            background:${color};
            margin-left:8px;
            vertical-align:middle;
        "></span>
    `;

})()}

</span>
                </div>

                ${sorted.map(r=>{

                    let better;

                    if(metric.key==="tov"){

    better = isDefense
        ? r.tov > overallStats.tov
        : r.tov < overallStats.tov;

}else{

    better = isDefense
        ? r[metric.key] < overallStats[metric.key]
        : r[metric.key] > overallStats[metric.key];

}

                    const equal=Math.abs(r[metric.key]-overallStats[metric.key])<0.0001;

                    const color=equal
                        ? "#666"
                        : better
                            ? "#1b8f3c"
                            : "#d93025";

                    const delta = r[metric.key] - overallStats[metric.key];

                    return `

                    <div style="
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        border-top:1px solid #eee;
                        padding:8px 0;
                    ">

                        <div>

                            <div>
                                ${r.name}
                            </div>

                            <div style="
                                font-size:11px;
                                color:#777;
                            ">
                                ${r.n} ${r.n==1?"acción":"acciones"}
                            </div>

                        </div>

                        <div style="
                            text-align:right;
                        ">

                            <div style="
                                font-weight:bold;
                                color:${color};
                            ">
                                ${metric.format(r[metric.key])}
                            </div>

                            <div style="
                                font-size:11px;
                                color:${color};
                            ">

                                ${
                                    metric.key==="ppt"
                                        ? `${delta>=0?"+":""}${delta.toFixed(2)}`
                                        : `${delta>=0?"+":""}${(delta*100).toFixed(1)}`
                                }

                            </div>

                        </div>

                    </div>

                    `;

                }).join("")}

            </div>

            `;

        }).join("");

}

/* ---------------------------
   INIT
---------------------------- */
loadTeams();
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
